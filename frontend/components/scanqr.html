<!DOCTYPE div>
<div class="screen-container scanqr-container">
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h2>Scan QR Code</h2>
        <div style="width: 40px;"></div>
    </div>

    <!-- QR Scanner Simulator -->
    <div class="qr-scanner">
        <div class="scanner-viewfinder">
            <div class="scanner-overlay">
                <div class="scanner-frame"></div>
            </div>
            <div class="scanning-line"></div>
            <div class="scanner-message">
                <span>📷</span>
                <p>Align QR code within frame</p>
            </div>
        </div>
    </div>

    <!-- Manual Entry Option -->
    <div class="card">
        <h3>Or enter manually</h3>
        <div class="input-group">
            <input type="text" id="manual-upi" class="input-field" placeholder="Enter UPI ID">
        </div>
        <button class="btn btn-primary btn-block" onclick="processManualQRFromComponent()">
            Continue with UPI ID
        </button>
    </div>

    <!-- Recent Scans -->
    <div class="card">
        <h3>📱 Recent Scans</h3>
        <div id="recent-scans" class="recent-scans-list">
            <div class="empty-state-small">No recent scans</div>
        </div>
    </div>

    <!-- Tips -->
    <div class="tips-card">
        <h4>💡 Tips</h4>
        <ul>
            <li>Make sure QR code is clear and well-lit</li>
            <li>Hold your phone steady</li>
            <li>Verify UPI ID before paying</li>
        </ul>
    </div>
</div>

<style>
.scanqr-container {
    padding: 20px;
    background: #f5f7fb;
    min-height: 100vh;
    padding-bottom: 80px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.qr-scanner {
    margin-bottom: 20px;
}

.scanner-viewfinder {
    position: relative;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: 24px;
    height: 350px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.scanner-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
}

.scanner-frame {
    width: 250px;
    height: 250px;
    border: 2px solid #6C63FF;
    border-radius: 20px;
    box-shadow: 0 0 0 999px rgba(0,0,0,0.5);
}

.scanning-line {
    position: absolute;
    width: 250px;
    height: 2px;
    background: #6C63FF;
    animation: scanAnimation 2s linear infinite;
    box-shadow: 0 0 10px #6C63FF;
}

@keyframes scanAnimation {
    0% { top: 20%; }
    50% { top: 80%; }
    100% { top: 20%; }
}

.scanner-message {
    position: absolute;
    bottom: 20px;
    text-align: center;
    color: white;
}

.scanner-message span {
    font-size: 2rem;
    display: block;
}

.card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

.tips-card {
    background: #E8F5E9;
    border-radius: 16px;
    padding: 20px;
}

.tips-card h4 {
    margin-bottom: 10px;
    color: #2E7D32;
}

.tips-card ul {
    padding-left: 20px;
}

.tips-card li {
    margin: 5px 0;
    font-size: 0.8rem;
    color: #333;
}

.empty-state-small {
    text-align: center;
    padding: 20px;
    color: #6c757d;
}
</style>
