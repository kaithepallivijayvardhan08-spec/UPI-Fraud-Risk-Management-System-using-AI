<!DOCTYPE div>
<div class="screen-container alerts-container">
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h2>🚨 Alerts</h2>
        <div style="width: 40px;"></div>
    </div>

    <!-- Active Alerts -->
    <div class="card">
        <h3>⚠️ Active Alerts</h3>
        <div id="active-alerts" class="alerts-list">
            <div class="alert-item success">
                <span>✅</span>
                <div>
                    <p>No active high-risk alerts</p>
                    <small>Your account looks secure</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Settings -->
    <div class="card">
        <h3>⚙️ Alert Settings</h3>
        <div class="setting-item">
            <label>
                <input type="checkbox" id="high-risk-alerts" checked onchange="saveAlertSettings()">
                High Risk Transaction Alerts
            </label>
        </div>
        <div class="setting-item">
            <label>
                <input type="checkbox" id="large-txn-alerts" checked onchange="saveAlertSettings()">
                Large Transaction Alerts (>₹10,000)
            </label>
        </div>
        <div class="setting-item">
            <label>
                <input type="checkbox" id="new-device-alerts" checked onchange="saveAlertSettings()">
                New Device Login Alerts
            </label>
        </div>
    </div>

    <!-- Alert History -->
    <div class="card">
        <h3>📋 Alert History</h3>
        <div id="alert-history-list" class="alerts-list">
            <div class="empty-state-small">No alert history</div>
        </div>
    </div>

    <!-- Blocked Transactions -->
    <div class="card">
        <h3>🚫 Blocked Transactions</h3>
        <div id="blocked-list" class="alerts-list">
            <div class="empty-state-small">No blocked transactions</div>
        </div>
    </div>
</div>

<style>
.alerts-container {
    padding: 20px;
    background: #f5f7fb;
    min-height: 100vh;
    padding-bottom: 80px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

.card h3 {
    margin-bottom: 15px;
    font-size: 1rem;
}

.alert-item {
    display: flex;
    gap: 12px;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
}

.alert-item.warning {
    background: #FFF3E0;
    border-left: 3px solid #FFC107;
}

.alert-item.danger {
    background: #FFEBEE;
    border-left: 3px solid #FF3B30;
}

.alert-item.success {
    background: #E8F5E9;
    border-left: 3px solid #00C853;
}

.setting-item {
    padding: 12px 0;
    border-bottom: 1px solid #eee;
}

.setting-item:last-child {
    border-bottom: none;
}

.setting-item label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
}

.empty-state-small {
    text-align: center;
    padding: 20px;
    color: #6c757d;
}
</style>
