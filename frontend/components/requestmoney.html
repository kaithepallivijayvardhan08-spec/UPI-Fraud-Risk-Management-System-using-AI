<!DOCTYPE div>
<div class="screen-container request-container">
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h2>Request Money</h2>
        <div style="width: 40px;"></div>
    </div>

    <div class="request-form">
        <div class="card">
            <div class="input-group">
                <label>📱 FROM (UPI ID)</label>
                <input type="text" id="request-from" class="input-field" placeholder="Enter sender's UPI ID">
            </div>

            <div class="input-group">
                <label>💰 AMOUNT</label>
                <input type="number" id="request-amount" class="input-field" placeholder="Enter amount">
            </div>

            <div class="input-group">
                <label>📝 REASON</label>
                <input type="text" id="request-reason" class="input-field" placeholder="e.g., Dinner, Rent, Shopping">
            </div>

            <div class="input-group">
                <label>📅 DUE DATE (Optional)</label>
                <input type="date" id="request-due" class="input-field">
            </div>

            <button class="btn btn-primary btn-block" onclick="sendMoneyRequestFromComponent()">
                SEND REQUEST
            </button>
        </div>

        <!-- Pending Requests -->
        <div class="card">
            <h3>⏳ Pending Requests</h3>
            <div id="pending-requests" class="requests-list">
                <div class="empty-state-small">No pending requests</div>
            </div>
        </div>

        <!-- Request History -->
        <div class="card">
            <h3>📋 Request History</h3>
            <div id="request-history-list" class="requests-list">
                <div class="empty-state-small">No request history</div>
            </div>
        </div>
    </div>
</div>

<style>
.request-container {
    padding: 20px;
    background: #f5f7fb;
    min-height: 100vh;
    padding-bottom: 80px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

.card h3 {
    margin-bottom: 15px;
    font-size: 1rem;
}

.request-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
}

.request-status {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
}

.status-pending {
    background: #FFC10720;
    color: #FF9800;
}

.status-paid {
    background: #00C85320;
    color: #00C853;
}

.empty-state-small {
    text-align: center;
    padding: 20px;
    color: #6c757d;
}
</style>
