cat > index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SafePay - UPI Fraud Prevention System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6C63FF;
            --primary-dark: #5a52d6;
            --secondary: #FF6584;
            --success: #00C853;
            --warning: #FFC107;
            --danger: #FF3B30;
            --critical: #8B0000;
            --dark: #1A1A2E;
            --gray: #6C757D;
            --light-gray: #F0F0F0;
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        #app {
            max-width: 450px;
            margin: 0 auto;
            background: #F5F7FB;
            min-height: 100vh;
            position: relative;
            box-shadow: var(--shadow-lg);
            transition: background 0.3s ease;
        }

        /* Loading Screen */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-container p {
            color: white;
            margin-top: 20px;
            font-size: 1rem;
        }

        /* Screens */
        .screen {
            display: none;
            animation: fadeIn 0.3s ease;
            min-height: 100vh;
            padding-bottom: 20px;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #E9ECEF;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.3s ease;
        }

        .header h1, .header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary);
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin: 16px;
            box-shadow: var(--shadow);
            transition: background 0.3s ease;
        }

        .card h3 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: var(--dark);
        }

        .card h4 {
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: var(--gray);
        }

        /* Buttons */
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-critical {
            background: var(--critical);
            color: white;
        }

        .btn-warning {
            background: #FF9800;
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-sm {
            padding: 10px 16px;
            font-size: 0.85rem;
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--gray);
            font-size: 0.85rem;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid #E9ECEF;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 16px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: background 0.3s ease;
        }

        .stat-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .stat-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-card p {
            font-size: 0.7rem;
            color: var(--gray);
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 0 16px;
            margin-bottom: 16px;
        }

        .action-btn {
            background: white;
            border: none;
            padding: 12px;
            border-radius: 14px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .action-btn span {
            display: block;
            font-size: 1.3rem;
            margin-bottom: 6px;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        /* Risk Meter */
        .risk-meter-container {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }

        .risk-gauge {
            position: relative;
            width: 160px;
            height: 160px;
        }

        .risk-gauge svg {
            transform: rotate(-90deg);
        }

        .risk-gauge circle {
            fill: none;
            stroke-width: 12;
        }

        .risk-gauge .bg-circle {
            stroke: #E9ECEF;
        }

        .risk-gauge .fill-circle {
            stroke: var(--primary);
            stroke-linecap: round;
            transition: stroke-dasharray 0.5s ease;
        }

        .risk-gauge .risk-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .risk-score {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .risk-label {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 20px;
            margin-top: 5px;
        }

        /* Transaction List */
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #E9ECEF;
            transition: border-color 0.3s ease;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-info h4 {
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .transaction-info p {
            font-size: 0.7rem;
            color: var(--gray);
        }

        .transaction-amount {
            font-weight: 700;
            font-size: 1rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--gray);
        }

        .empty-state span {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: block;
        }

        /* PIN Pad */
        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            background: #DDD;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .pin-dot.filled {
            background: var(--primary);
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .pin-key {
            padding: 18px;
            font-size: 1.5rem;
            font-weight: 600;
            border: none;
            background: #F0F0F0;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pin-key:active {
            transform: scale(0.94);
            background: var(--primary);
            color: white;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 450px;
            margin: 0 auto;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid #E9ECEF;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
            transition: background 0.3s ease;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray);
            transition: color 0.3s;
            font-size: 0.7rem;
        }

        .nav-item span:first-child {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        /* Alert Banner */
        .alert-banner {
            background: #FFF3E0;
            border-left: 4px solid var(--warning);
            padding: 15px;
            margin: 16px;
            border-radius: 12px;
        }

        .alert-banner.danger {
            background: #FFEBEE;
            border-left-color: var(--danger);
        }

        .alert-banner.critical {
            background: #8B000020;
            border-left-color: var(--critical);
        }

        /* Filter Chips */
        .filter-chips {
            display: flex;
            gap: 10px;
            padding: 0 16px;
            margin-bottom: 16px;
            overflow-x: auto;
        }

        .chip {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: white;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: var(--shadow);
            transition: background 0.3s ease;
        }

        .chip.active {
            background: var(--primary);
            color: white;
        }

        /* QR Scanner */
        .qr-scanner {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 24px;
            height: 350px;
            margin: 16px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scanner-frame {
            width: 220px;
            height: 220px;
            border: 2px solid var(--primary);
            border-radius: 20px;
            position: relative;
        }

        .scan-line {
            position: absolute;
            width: 220px;
            height: 2px;
            background: var(--primary);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 20%; }
            50% { top: 80%; }
            100% { top: 20%; }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            max-width: 410px;
            margin: 0 auto;
            padding: 12px 20px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        .toast-success { background: var(--success); color: white; }
        .toast-error { background: var(--danger); color: white; }
        .toast-info { background: var(--primary); color: white; }
        .toast-warning { background: #FF9800; color: white; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Settings Menu */
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #E9ECEF;
            cursor: pointer;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item.danger {
            color: var(--danger);
        }

        /* Language Selector */
        .language-selector {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #E9ECEF;
            background: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        /* Theme Toggle */
        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }

        .theme-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Switch Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        /* Payees List */
        .payees-list {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .payee-item {
            text-align: center;
            cursor: pointer;
        }

        .payee-avatar {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
        }

        .payee-name {
            font-size: 0.7rem;
            margin-top: 6px;
        }

        /* ============ DARK THEME STYLES ============ */
        body.dark-theme {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body.dark-theme #app {
            background: #1a1a2e;
        }

        body.dark-theme .card {
            background: #2a2a3e;
            color: white;
        }

        body.dark-theme .header {
            background: #2a2a3e;
            border-bottom-color: #3a3a4e;
        }

        body.dark-theme .header h1,
        body.dark-theme .header h2 {
            color: white;
        }

        body.dark-theme .stat-card {
            background: #2a2a3e;
            color: white;
        }

        body.dark-theme .action-btn {
            background: #2a2a3e;
            color: white;
        }

        body.dark-theme .input-group input,
        body.dark-theme .input-group select {
            background: #3a3a4e;
            color: white;
            border-color: #4a4a5e;
        }

        body.dark-theme .transaction-item {
            border-bottom-color: #3a3a4e;
        }

        body.dark-theme .btn-outline {
            border-color: #6C63FF;
            color: #6C63FF;
        }

        body.dark-theme .risk-gauge .bg-circle {
            stroke: #3a3a4e;
        }

        body.dark-theme .pin-key {
            background: #3a3a4e;
            color: white;
        }

        body.dark-theme .filter-chips .chip {
            background: #2a2a3e;
            color: white;
        }

        body.dark-theme .filter-chips .chip.active {
            background: #6C63FF;
        }

        body.dark-theme .empty-state {
            color: #aaa;
        }

        body.dark-theme .alert-banner {
            background: #3a3a4e;
        }

        body.dark-theme .alert-banner.danger {
            background: #4a2a2e;
        }

        body.dark-theme .bottom-nav {
            background: #2a2a3e;

        }

        body.dark-theme .language-selector {

            border-color: #4a4a5e;
        }

        @media (max-width: 480px) {
            .stats-grid { gap: 8px; }

    </style>

<body>
    <div id="app">
        <div class="loading-container" id="loading">
            <div class="loader"></div>
            <p>Loading SafePay...</p>
        </div>
    </div>

    <script>
        // ============ STORAGE KEYS ============
        const STORAGE_KEYS = {
            USER: 'safepay_user',
            PROFILE: 'safepay_profile',
            TRANSACTIONS: 'safepay_transactions',
            BALANCE: 'safepay_balance',
            PAYEES: 'safepay_payees',
            NOTIFICATIONS: 'safepay_notifications',
            PENDING_APPROVALS: 'safepay_pending_approvals'
        };

        let currentScreen = 'login';

        // ============ HELPER FUNCTIONS ============
        function formatCurrency(amount) {
            return '₹' + amount.toLocaleString('en-IN');
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function generateId() {
            return 'TXN' + Date.now().toString(36) + Math.random().toString(36).substr(2).toUpperCase();
        }

        function getCurrentUser() {
            const user = localStorage.getItem(STORAGE_KEYS.USER);
            return user ? JSON.parse(user) : null;
        }

        function setCurrentUser(user) {
            localStorage.setItem(STORAGE_KEYS.USER, JSON.stringify(user));
        }

        function clearAllData() {
            localStorage.removeItem(STORAGE_KEYS.USER);
            localStorage.removeItem(STORAGE_KEYS.PROFILE);
            localStorage.removeItem(STORAGE_KEYS.TRANSACTIONS);
            localStorage.removeItem(STORAGE_KEYS.BALANCE);
            localStorage.removeItem(STORAGE_KEYS.PAYEES);
            localStorage.removeItem(STORAGE_KEYS.NOTIFICATIONS);
            localStorage.removeItem(STORAGE_KEYS.PENDING_APPROVALS);
            localStorage.removeItem('safepay_users');
            localStorage.removeItem('safepay_preferences');
            localStorage.removeItem('safepay_theme');
            localStorage.removeItem('safepay_language');
        }

        function addNotification(message, type) {
            const notifications = JSON.parse(localStorage.getItem(STORAGE_KEYS.NOTIFICATIONS) || '[]');
            notifications.unshift({
                id: Date.now(),
                message,
                type,
                time: new Date().toLocaleString(),
                read: false
            });
            localStorage.setItem(STORAGE_KEYS.NOTIFICATIONS, JSON.stringify(notifications.slice(0, 50)));
        }

        function validateUPIId(upiId) {
            return /^[a-zA-Z0-9._-]+@[a-zA-Z0-9]+$/.test(upiId);
        }

        function validateAmount(amount) {
            return amount > 0 && amount <= 100000;
        }

        function getRiskIcon(level) {
            if (level === 'Critical' || level === 'Blocked') return '🚫';
            if (level === 'High') return '🟠';
            if (level === 'Medium') return '🟡';
            if (level === 'Pending Approval') return '⏳';
            return '🟢';
        }

        function getRiskColor(level) {
            if (level === 'Critical' || level === 'Blocked') return '#8B0000';
            if (level === 'High') return '#FF9800';
            if (level === 'Medium') return '#FFC107';
            if (level === 'Pending Approval') return '#2196F3';
            return '#00C853';
        }

        // ============ RISK CALCULATION ============
        function calculateRisk(amount, isNewReceiver) {
            let riskScore = 0;
            let reasons = [];
            
            if (amount > 10000) {
                riskScore += 35;
                reasons.push("💰 Amount is very high (₹" + amount.toLocaleString() + ")");
            } else if (amount > 5000) {
                riskScore += 20;
                reasons.push("💰 Amount is higher than average");
            }
            
            const hour = new Date().getHours();
            if (hour < 6 || hour > 22) {
                riskScore += 20;
                reasons.push("⏰ Unusual transaction time");
            }
            
            if (isNewReceiver) {
                riskScore += 25;
                reasons.push("🆕 First time sending to this receiver");
            }
            
            const transactions = JSON.parse(localStorage.getItem(STORAGE_KEYS.TRANSACTIONS) || '[]');
            if (transactions.length < 3) {
                riskScore += 10;
                reasons.push("🆕 New user - limited history");
            }
            
            riskScore = Math.min(riskScore, 100);
            
            let riskLevel = 'Low';
            let color = '🟢';
            if (riskScore >= 85) {
                riskLevel = 'Critical';
                color = '🚫';
            } else if (riskScore >= 70) {
                riskLevel = 'High';
                color = '🟠';
            } else if (riskScore >= 30) {
                riskLevel = 'Medium';
                color = '🟡';
            }
            
            return { riskScore, riskLevel, color, reasons: reasons.slice(0, 3) };
        }

        function updateRiskGauge(containerId, riskScore, riskLevel) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            const circumference = 2 * Math.PI * 70;
            const dashArray = (riskScore / 100) * circumference;
            let color = riskScore >= 85 ? '#8B0000' : riskScore >= 70 ? '#FF9800' : riskScore >= 30 ? '#FFC107' : '#00C853';
            
            container.innerHTML = `
                <div class="risk-gauge">
                    <svg width="160" height="160" viewBox="0 0 160 160">
                        <circle class="bg-circle" cx="80" cy="80" r="70" stroke="#E9ECEF" stroke-width="10" fill="none"/>
                        <circle class="fill-circle" cx="80" cy="80" r="70" stroke="${color}" stroke-width="10" fill="none"
                                stroke-dasharray="${dashArray} ${circumference}" stroke-linecap="round"/>
                    </svg>
                    <div class="risk-text">
                        <div class="risk-score" style="color: ${color}">${riskScore}%</div>

        function checkApprovalStatus(transactionId) {
            const transactions = JSON.parse(localStorage.getItem(STORAGE_KEYS.TRANSACTIONS) || '[]');
            const transaction = transactions.find(t => t.id === transactionId);
            const pendingApprovals = JSON.parse(localStorage.getItem(STORAGE_KEYS.PENDING_APPROVALS) || '[]');
            const isStillPending = pendingApprovals.some(p => p.id === transactionId);
            
            if (!isStillPending && transaction && transaction.status === 'approved') {
                showToast('✅ Transaction approved! You can now complete payment.', 'success');
                showPinVerification(transaction.to, transaction.amount, transaction.note, transaction.risk_score, 'High');
            } else if (!isStillPending && transaction && transaction.status === 'rejected') {
                showToast('❌ Transaction was rejected by admin.', 'error');
                showDashboard();
            } else {
                showToast('⏳ Still pending approval. Please wait or contact admin.', 'info');
            }
        }

        function processPayment() {
            const to = document.getElementById('payment-to')?.value;
            const amount = parseFloat(document.getElementById('payment-amount')?.value);
            const note = document.getElementById('payment-note')?.value;
            
            if (!to || !amount) {
                showToast('Please enter UPI ID and amount', 'error');
                return;
            }
            
            if (!validateUPIId(to)) {
                showToast('Invalid UPI ID format', 'error');
                return;
            }
            
            const payees = JSON.parse(localStorage.getItem(STORAGE_KEYS.PAYEES) || '[]');
            const isNewReceiver = !payees.some(p => p.upi === to);
            const { riskScore, riskLevel, color, reasons } = calculateRisk(amount, isNewReceiver);
            
            // NEW: Block Critical risk transactions (≥85%)
            if (riskScore >= 85) {
                showBlockedTransaction(to, amount, note, riskScore, riskLevel, reasons);
                return;
            }
            
            if (riskLevel === 'High') {
                showRiskWarning(to, amount, note, riskScore, riskLevel, reasons);
            } else {
                showPinVerification(to, amount, note, riskScore, riskLevel);
            }
        }

            window.addPinDigit = (digit) => {
                pinEntered += digit;
                updatePinDots();

            window.deletePinDigit = () => {

        function confirmPayment(to, amount, note, riskScore, riskLevel) {
            // Block Critical risk (≥85%) - Double check
            if (riskScore >= 85) {
                showToast('❌ Transaction blocked due to critical risk!', 'error');
                showBlockedTransaction(to, amount, note, riskScore, 'Critical', []);
                return;
            }
            
            const profile = JSON.parse(localStorage.getItem(STORAGE_KEYS.PROFILE) || '{}');
            const balance = parseFloat(localStorage.getItem(STORAGE_KEYS.BALANCE) || 0);
            
            if (amount > balance) {
                showToast('Insufficient balance', 'error');
                showSendMoney();
                return;
            }
            
            const transaction = {
                id: generateId(),
                to: to,
                amount: amount,
                note: note,
                risk_score: riskScore,
                risk_level: riskLevel,
                risk_icon: riskLevel === 'High' ? '🟠' : riskLevel === 'Medium' ? '🟡' : '🟢',
                date: new Date().toLocaleString(),
                status: 'completed'
            };
            
            const transactions = JSON.parse(localStorage.getItem(STORAGE_KEYS.TRANSACTIONS) || '[]');
            transactions.unshift(transaction);
            localStorage.setItem(STORAGE_KEYS.TRANSACTIONS, JSON.stringify(transactions));
            
            const payees = JSON.parse(localStorage.getItem(STORAGE_KEYS.PAYEES) || '[]');
            const existing = payees.find(p => p.upi === to);
            if (existing) {
                existing.count++;
                existing.lastTransaction = new Date().toLocaleString();
            } else {
                payees.unshift({ upi: to, name: to.split('@')[0], count: 1, lastTransaction: new Date().toLocaleString() });
            }
            localStorage.setItem(STORAGE_KEYS.PAYEES, JSON.stringify(payees.slice(0, 10)));
            
            const newBalance = balance - amount;
            localStorage.setItem(STORAGE_KEYS.BALANCE, newBalance);
            
            addNotification(`${formatCurrency(amount)} sent to ${to}`, 'success');
            if (riskLevel === 'High') {
                addNotification(`⚠️ HIGH RISK transaction of ${formatCurrency(amount)} was completed after approval`, 'warning');
            }
            
            showToast('✅ Payment successful!', 'success');
            showDashboard();
        }

        };

        let currentLanguage = localStorage.getItem('safepay_language') || 'en';

        function changeLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('safepay_language', lang);
            showToast(`Language changed to ${getLanguageName(lang)}`, 'success');
            updateUIText();
        }

        function getLanguageName(lang) {
            const names = { en: 'English', hi: 'हिंदी', te: 'తెలుగు', ta: 'தமிழ்', kn: 'ಕನ್ನಡ' };
            return names[lang] || 'English';
        }

        function t(key) {
            return translations[currentLanguage]?.[key] || translations.en[key] || key;
        }

        function updateUIText() {
            const sendBtn = document.querySelector('.action-btn.primary span:last-child');
            const scanBtn = document.querySelectorAll('.action-btn')[1]?.querySelector('span:last-child');
            const requestBtn = document.querySelectorAll('.action-btn')[2]?.querySelector('span:last-child');
            const settingsBtn = document.querySelectorAll('.action-btn')[3]?.querySelector('span:last-child');
            
            if (sendBtn) sendBtn.textContent = t('send_money');
            if (scanBtn) scanBtn.textContent = t('scan_qr');
            if (requestBtn) requestBtn.textContent = t('request_money');
            if (settingsBtn) settingsBtn.textContent = t('settings');
            
            const navItems = document.querySelectorAll('.nav-item');
            if (navItems[0]) navItems[0].querySelector('span:last-child').textContent = 'Home';
            if (navItems[1]) navItems[1].querySelector('span:last-child').textContent = t('history');
            if (navItems[2]) navItems[2].querySelector('span:last-child').textContent = t('alerts');
            if (navItems[3]) navItems[3].querySelector('span:last-child').textContent = 'Notify';
            if (navItems[4]) navItems[4].querySelector('span:last-child').textContent = t('settings');
        }

        function toggleTheme() {
            const isDark = document.getElementById('theme-toggle')?.checked;
            if (isDark) {
                document.body.classList.add('dark-theme');
                localStorage.setItem('safepay_theme', 'dark');
                showToast('Dark mode enabled', 'success');
            } else {
                document.body.classList.remove('dark-theme');
                localStorage.setItem('safepay_theme', 'light');
                showToast('Light mode enabled', 'success');
            }
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
            } else {
                document.body.classList.remove('dark-theme');
            }
        }

        function loadSavedTheme() {
            const savedTheme = localStorage.getItem('safepay_theme') || 'light';
            applyTheme(savedTheme);
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.checked = savedTheme === 'dark';
            }
        }

        function showNotifications() {
            currentScreen = 'notifications';
            const notifications = JSON.parse(localStorage.getItem(STORAGE_KEYS.NOTIFICATIONS) || '[]');
            
            notifications.forEach(n => n.read = true);
            localStorage.setItem(STORAGE_KEYS.NOTIFICATIONS, JSON.stringify(notifications));
            
            document.getElementById('app').innerHTML = `
                <div class="screen active" style="background: #F5F7FB; min-height: 100vh;">
                    <div class="header">
                        <button class="back-btn" onclick="showDashboard()">←</button>
                        <h2>🔔 Notifications</h2>
                        <button onclick="clearAllNotifications()" style="background: none; border: none; font-size: 0.8rem; color: var(--danger);">Clear</button>
                    </div>
                    
                    <div class="card">
                        ${notifications.length === 0 ?
                            '<div class="empty-state"><span>🔔</span><p>No notifications yet</p></div>' :
                            notifications.map(n => `
                                <div class="transaction-item">
                                    <div>
                                        <p><strong>${n.type === 'success' ? '✅' : n.type === 'warning' ? '⚠️' : 'ℹ️'} ${n.message}</strong></p>
                                        <p style="font-size: 0.7rem; color: var(--gray);">${n.time}</p>
                                    </div>
                                </div>
                            `).join('')
                        }
                    </div>
                    
                    <div class="bottom-nav">
                        <button class="nav-item" onclick="showDashboard()"><span>📊</span><span>Home</span></button>
                        <button class="nav-item" onclick="showHistory()"><span>📜</span><span>History</span></button>
                        <button class="nav-item" onclick="showAlerts()"><span>🚨</span><span>Alerts</span></button>
                        <button class="nav-item active" onclick="showNotifications()"><span>🔔</span><span>Notify</span></button>
                        <button class="nav-item" onclick="showSettings()"><span>⚙️</span><span>Settings</span></button>
                    </div>
                </div>
            `;
        }

        function clearAllNotifications() {
            localStorage.setItem(STORAGE_KEYS.NOTIFICATIONS, JSON.stringify([]));
            showNotifications();
        }

        function showScanQR() {
            currentScreen = 'scanqr';
            document.getElementById('app').innerHTML = `
                <div class="screen active" style="background: #F5F7FB; min-height: 100vh;">
                    <div class="header">
                        <button class="back-btn" onclick="showDashboard()">←</button>
                        <h2>Scan QR Code</h2>
                        <div style="width: 40px;"></div>
                    </div>
                    
                    <div class="qr-scanner">
                        <div class="scanner-frame"></div>
                        <div class="scan-line"></div>
                        <div style="text-align: center; color: white; position: absolute; bottom: 20px;">
                            <p>📷 Align QR code within frame</p>
                        </div>
                    </div>
                    
                    <div class="card">
                        <h3>Or enter manually</h3>
                        <div class="input-group">
                            <input type="text" id="manual-upi" placeholder="Enter UPI ID">
                        </div>
                        <button class="btn btn-primary" onclick="processManualQR()">Continue</button>
                    </div>
                </div>
            `;
            
            setTimeout(() => {
                const input = document.getElementById('manual-upi');
                if (input && !input.value) {
                    input.placeholder = "QR detected! Tap to edit";
                    showToast('QR Code detected!', 'success');
                }
            }, 3000);
        }

        function processManualQR() {
            const upiId = document.getElementById('manual-upi')?.value;
            if (upiId && validateUPIId(upiId)) {
                showSendMoney();
                setTimeout(() => {
                    const toInput = document.getElementById('payment-to');
                    if (toInput) toInput.value = upiId;
                }, 100);
            } else {
                showToast('Please enter a valid UPI ID', 'error');
            }
        }

        function showRequestMoney() {
            currentScreen = 'requestmoney';
            document.getElementById('app').innerHTML = `
                <div class="screen active" style="background: #F5F7FB; min-height: 100vh;">
                    <div class="header">
                        <button class="back-btn" onclick="showDashboard()">←</button>
                        <h2>Request Money</h2>
                        <div style="width: 40px;"></div>
                    </div>
                    
                    <div class="card">
                        <div class="input-group">
                            <label>FROM (UPI ID)</label>
                            <input type="text" id="request-from" placeholder="Enter sender's UPI ID">
                        </div>
                        <div class="input-group">
                            <label>AMOUNT</label>
                            <input type="number" id="request-amount" placeholder="Enter amount">
                        </div>
                        <div class="input-group">
                            <label>REASON</label>
                            <input type="text" id="request-reason" placeholder="e.g., Dinner, Rent">
                        </div>
                        <button class="btn btn-primary" onclick="sendMoneyRequest()">SEND REQUEST</button>
                    </div>
                </div>
            `;
        }

        function sendMoneyRequest() {
            const from = document.getElementById('request-from')?.value;
            const amount = parseFloat(document.getElementById('request-amount')?.value);
            const reason = document.getElementById('request-reason')?.value;
            
            if (!from || !amount) {
                showToast('Please fill all fields', 'error');
                return;
            }
            
            if (!validateUPIId(from)) {
                showToast('Invalid UPI ID format', 'error');
                return;
            }
            
            addNotification(`Money request of ${formatCurrency(amount)} sent to ${from}`, 'info');
            showToast(`Request sent to ${from}`, 'success');
            showDashboard();
        }

        function quickPay(upiId) {
            showSendMoney();
            setTimeout(() => {
                const toInput = document.getElementById('payment-to');
                if (toInput) toInput.value = upiId;
            }, 100);
        }

        function logout() {
            clearAllData();
            showLogin();
        }

        // Make all functions global
        window.showLogin = showLogin;
        window.showSignup = showSignup;
        window.showBiometricLogin = showBiometricLogin;
        window.handleLogin = handleLogin;
        window.handleSignup = handleSignup;
        window.showBankSetup = showBankSetup;
        window.completeSetup = completeSetup;
        window.showDashboard = showDashboard;
        window.showSendMoney = showSendMoney;
        window.processPayment = processPayment;
        window.showPinVerification = showPinVerification;
        window.confirmPayment = confirmPayment;
        window.useBiometric = useBiometric;
        window.showHistory = showHistory;
        window.filterHistory = filterHistory;
        window.viewTransaction = viewTransaction;
        window.showAlerts = showAlerts;
        window.saveAlertSettings = saveAlertSettings;
        window.showSettings = showSettings;
        window.updateBalance = updateBalance;
        window.changePin = changePin;
        window.enableBiometric = enableBiometric;
        window.exportData = exportData;
        window.clearAllDataAndLogout = clearAllDataAndLogout;
        window.savePreferences = savePreferences;
        window.changeLanguage = changeLanguage;
        window.toggleTheme = toggleTheme;
        window.showNotifications = showNotifications;
        window.clearAllNotifications = clearAllNotifications;
        window.showScanQR = showScanQR;
        window.processManualQR = processManualQR;
        window.showRequestMoney = showRequestMoney;
        window.sendMoneyRequest = sendMoneyRequest;
        window.quickPay = quickPay;
        window.logout = logout;
        window.showBlockedTransaction = showBlockedTransaction;
        window.requestAdminApproval = requestAdminApproval;
        window.checkApprovalStatus = checkApprovalStatus;
        
        // Load saved theme on startup
        loadSavedTheme();
        
        // Start app
        setTimeout(() => {
            const user = getCurrentUser();
            const profile = localStorage.getItem(STORAGE_KEYS.PROFILE);
            if (user && profile) {
                showDashboard();
            } else {
                showLogin();
            }
        }, 500);
    </script>
